# --- 視窗設定 (Window Settings) ---
[window]
dimensions = { columns = 100, lines = 25 }
padding = { x = 12, y = 12 }
dynamic_padding = true
decorations = "full"
opacity = 0.85        # 根據 Dracula 設定調整為 0.85
blur = true           

# --- 字體設定 (Font Settings) ---
[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 12.0           # 根據 Dracula 設定調整為 12

[font.offset]
x = 0 
y = 1 

# --- 顏色配置 (Color Scheme) ---
# Dracula Theme
[colors.primary]
background            = "#282A36"
foreground            = "#F8F8F2"
dim_foreground        = "#F8F8F2"
bright_foreground     = "#FFFFFF"

[colors.cursor]
text                  = "#282A36"
cursor                = "#F8F8F2"

[colors.vi_mode_cursor]
text                  = "#282A36"
cursor                = "#BD93F9"

[colors.selection]
text                  = "CellForeground"
background            = "#44475A"

# 標準 8 色 (ANSI Colors)
[colors.normal]
black                 = "#000000"
red                   = "#FF5555"
green                 = "#50FA7B"
yellow                = "#F1FA8C"
blue                  = "#BD93F9"
magenta               = "#FF79C6"
cyan                  = "#8BE9FD"
white                 = "#BFBFBF"

# 高亮 8 色 (Bright ANSI Colors)
[colors.bright]
black                 = "#4D4D4D"
red                   = "#FF6E6E"
green                 = "#69FF94"
yellow                = "#FFFFA5"
blue                  = "#D6ACFF"
magenta               = "#FF92DF"
cyan                  = "#A4FFFF"
white                 = "#FFFFFF"

# 其他顏色相關設定
[colors]
draw_bold_text_with_bright_colors = true

# --- 游標設定 (Cursor Settings) ---
[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 500

# --- 捲動設定 (Scrolling Settings) ---
[scrolling]
history = 10000
multiplier = 3

# --- 其他效能與行為 (Miscellaneous Behavior) ---
[selection]
save_to_clipboard = true 

# --- Shell 設定 ---
[shell]
program               = "/usr/bin/zsh"
args                  = [ "--login", ]
